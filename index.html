<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的IG頁</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(45deg,#fdf6f9,#ffe0f0,#fff);
    display: flex;
    justify-content: center;
}

/* 主容器 /
.container {
    width: 100%;
    max-width: 400px;
    text-align: center;
    padding: 20px;
}

/ 頭像 /
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-top: 30px;
}

/ 名字 /
h1 {
    margin: 10px 0 5px;
}

/ 簡介 /
.bio {
    color: #666;
    margin-bottom: 20px;
}

/ 按鈕 /
.link {
    display: block;
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 30px;
    text-decoration: none;
    color: black;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.2s;
}

/ 按下效果 */
.link:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg,#ff5f9e,#ff8fab);
    color: white;
}
</style>

</head>

<body>

<div class="container">

<img src="https://i.imgur.com/6VBx3io.png" class="avatar">

<h1>你的名字</h1>
<p class="bio">這裡放你的介紹 💖</p>

<a href="https://instagram.com" class="link">📸 我的IG</a>
<a href="https://youtube.com" class="link">🎬 我的YouTube</a>
<a href="https://google.com" class="link">🌐 官方網站</a>
<a href="https://line.me" class="link">💬 加我LINE</a>

</div>

</body>
</html>
