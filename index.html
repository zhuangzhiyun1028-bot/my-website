<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大老爺娛樂城</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

/* 主畫面 /
.hero {
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #ccc;
}

/ 按鈕 /
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: gold;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

/ 卡片 */
.section {
  padding: 60px 20px;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 15px;
  width: 220px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>大老爺娛樂城</h1>
  <p>頂級玩家專屬娛樂平台</p>
  <a href="https://google.com" class="btn">立即加入</a>
</div>

<div class="section">
  <h2>尊榮優惠</h2>

  <div class="cards">
    <div class="card">
      <h3>🎁 新會員</h3>
      <p>首儲最高100%</p>
    </div>

    <div class="card">
      <h3>💰 回饋</h3>
      <p>每日返水優惠</p>
    </div>

    <div class="card">
      <h3>⚡ 快速出金</h3>
      <p>安全穩定提款</p>
    </div>
  </div>

  <a href="https://google.com" class="btn">開始遊戲</a>
</div>

</body>
</html>
