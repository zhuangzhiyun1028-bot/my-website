<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大老爺娛樂城</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;

  /* 🌈 彩色背景（不是黑的） /
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1);
}

/ 主畫面 /
.hero {
  padding: 100px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  color: #fff;
}

/ 按鈕 /
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: white;
  color: #ff4d6d;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

/ 區塊 /
.section {
  padding: 60px 20px;
}

/ 卡片 */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.2);
  padding: 25px;
  border-radius: 20px;
  width: 220px;
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<div class="hero">
  <h1>大老爺娛樂城</h1>
  <p>頂級娛樂・專屬尊榮</p>
  <a href="https://google.com" class="btn">立即加入</a>
</div>

<div class="section">
  <h2>熱門優惠</h2>

  <div class="cards">
    <div class="card">
      <h3>🎁 新人禮</h3>
      <p>首儲翻倍</p>
    </div>

    <div class="card">
      <h3>💰 回饋</h3>
      <p>天天返水</p>
    </div>

    <div class="card">
      <h3>⚡ 出金</h3>
      <p>快速安全</p>
    </div>
  </div>

  <a href="https://google.com" class="btn">開始遊戲</a>
</div>

</body>
</html>
