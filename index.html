<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大老爺娛樂城</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  color: white;
  text-align: center;

  /* 🎰 高級娛樂城背景（漸層＋光感） /
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  background-attachment: fixed;
}

/ 中間容器 /
.container {
  max-width: 400px;
  margin: auto;
  padding: 40px 20px;
}

/ 標題 /
h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  color: #ccc;
  margin-bottom: 30px;
}

/ 按鈕 /
.btn {
  display: block;
  width: 100%;
  padding: 15px;
  margin: 12px 0;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

/ 金色主按鈕 /
.gold {
  background: linear-gradient(45deg, gold, orange);
  color: black;
}

.gold:hover {
  transform: scale(1.05);
}

/ 卡片 /
.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/ 區塊 */
.section {
  margin-top: 40px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 標題 -->
  <h1>🎰 大老爺娛樂城</h1>
  <p>頂級玩家專屬娛樂平台</p>

  <!-- 主按鈕（可改連結） -->
  <a href="https://google.com" class="btn gold">立即加入</a>

  <!-- 優惠 -->
  <div class="section">
    <div class="card">🎁 新會員：首儲最高100%</div>
    <div class="card">💰 每日返水回饋</div>
    <div class="card">⚡ 快速出金 安全穩定</div>
  </div>

  <!-- 連結區（全部可點） -->
  <div class="section">
    <a href="https://google.com" class="btn gold">開始遊戲</a>
    <a href="https://line.me" class="btn gold">加入LINE</a>
    <a href="https://instagram.com" class="btn gold">官方IG</a>
  </div>

</div>

</body>
</html>
